
configuration:
  host_name:
    name: Host name
    description: DNS name included in the generated certificate. You can leave homeassistant.local
  host_ip:
    name: Home Assistant IP address
    description: IP address included in the generated certificate. This field is required.
  ha_port:
    name: Home Assistant port
    description: Unencrypted port where Home Assistant listens.
  cert_valid_for:
    name: Certificate validity
    description: Number of days the generated self-signed certificate remains valid.
  auto_recreate_cert:
    name: Auto recreate certificate
    description: Recreate the certificate when it no longer matches the configuration or is near expiration.
